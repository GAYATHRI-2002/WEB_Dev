<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="full-img" id="fullImgBox">
        <img src="images/jaipur.jpeg" id="fullImg"  srcset="">
        <span onclick="closeFullImg()">X</span>
    </div>
    
    <div class="img-gallery">
        <img src="images/jaipur.jpeg" onclick="openFullImg(this.src)">
        <img src="images/paris.jpeg" onclick="openFullImg(this.src)">
        <img src="images/kerala.jpeg" onclick="openFullImg(this.src)">
        <img src="images/place1.jpeg" onclick="openFullImg(this.src)">
        <img src="images/place2.jpeg" onclick="openFullImg(this.src)">
        <img src="images/place3.jpg" onclick="openFullImg(this.src)">
        <img src="images/place4.jpg" onclick="openFullImg(this.src)">
        <img src="images/tajmahal.jpeg" onclick="openFullImg(this.src)">
        <img src="images/jaipur.jpeg" onclick="openFullImg(this.src)">
        <img src="images/download (3).jpeg" onclick="openFullImg(this.src)">
        <img src="images/Slow Travel Guide to Cairo, Egypt - Insider Tips to Discovering City.jpeg" onclick="openFullImg(this.src)">
        <img src="images/Northern Lights.jpeg" onclick="openFullImg(this.src)">

    </div>

    <script src="index.js"></script>
</body>
</html>
