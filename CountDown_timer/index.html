<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="Launching_page_img/images/logo.png" class="logo" alt="">

        <div class="content">
            <p>Website is under maintenance</p>
            <h1>We are <span>launching </span>soon....</h1>
            <div class="launch-time">
                <div>
                    <p id="days">00</p>
                    <span>Days</span>
                </div>
                <div>
                    <p id="hours">00</p>
                    <span>Hours</span>
                </div>
                <div>
                    <p id="minutes">00</p>
                    <span>Minutes</span>
                </div>
                <div>
                    <p id="seconds">00</p>
                    <span>Seconds</span>
                </div>
            </div>
            <button type="submit">Learn More <img src="Launching_page_img/images/triangle.png" alt=""></button>
        </div>

        <img src="Launching_page_img/images/rocket.png" class="rocket" alt="">

    </div>

    <script src="index.js"></script>
    
</body>
</html>
